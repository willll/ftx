name: Build Ftx macOS

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-macos:
    name: Build macOS (ARM64)
    runs-on: macos-latest

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew update
          brew install cmake boost libftdi pkg-config

      - name: Create build directory and build
        run: |
          mkdir buildmac
          cd buildmac
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build .
          strip ftx

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ftx-macos
          path: buildmac/ftx

      - name: Upload executable to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${GITHUB_REF##*/}/assets
          asset_path: buildmac/ftx
          asset_name: ftx-macos
          asset_content_type: application/octet-stream
        if: github.ref_type == 'tag'
